name: Update data JSON

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"  # 6시간마다 (UTC)

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Run collectors
        env:
          MUST_WORDS: ${{ secrets.MUST_WORDS }}
          MAX_SAVE: ${{ secrets.MAX_SAVE }}
          RECENT_DAYS: ${{ secrets.RECENT_DAYS }}
          MAX_FETCH: ${{ secrets.MAX_FETCH }}
          SEARCH_RESULTS: ${{ secrets.SEARCH_RESULTS }}
          SLEEP_SEC: ${{ secrets.SLEEP_SEC }}

          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}

          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_CX: ${{ secrets.GOOGLE_CX }}

          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}

          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
        run: |
          cd scripts
          python run_all.py

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/*.json
          if git diff --cached --quiet; then
            echo "No changes."
            exit 0
          fi
          git commit -m "Update data JSON"
          git push
